    <body id="body">
        <div id="header" class="header"></div>
        <script>
            fetch("/projects/components/header.html")
                .then((res) => res.text())
                .then((data) => {
                    document.getElementById("header").innerHTML = data;
                    // Load projects.js after header is loaded
                    const script = document.createElement("script");
                    script.src = "/js/index.js";
                    document.body.appendChild(script);

                    // Load projects.js after header is loaded
                });
        </script>

        <div id="project-container" class="project-container">
            <div id="projects-list" class="projects-list"></div>
            <script>
                fetch("/projects/components/list.html")
                    .then((res) => res.text())
                    .then((data) => {
                        document.getElementById("projects-list").innerHTML =
                            data;
                    });
            </script>
            <div class="project-container-separator"></div>
            <div class="projects-content">
                <h1>Title</h1>
                <h2>Subtitle</h2>
