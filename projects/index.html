<!doctype html>
<html lang="en">
    <link type="text/css" id="dark-mode" rel="stylesheet" href="" /><style
        type="text/css"
        id="dark-mode-custom-style"
    ></style>
    <head>
        <link type="text/css" id="dark-mode" rel="stylesheet" href="" />
        <style type="text/css" id="dark-mode-custom-style"></style>
        <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
        <meta name="description" content="dubbyy" />
        <meta charset="utf-8" />
        <title>dubbyy</title>
        <link rel="icon" href="images/favicon.ico" sizes="any" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="author" content="dubbyy" />
        <link rel="stylesheet" href="css/index.css" />
        <script src="js/jquery-latest.min.js"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap");
            @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap");
            @import url("https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap");
        </style>
    </head>

    <body id="body">
        <div id="header" class="header"></div>
        <script>
            fetch("components/header.html")
                .then((res) => res.text())
                .then((data) => {
                    document.getElementById("header").innerHTML = data;
                    // Load projects.js after header is loaded
                    const script = document.createElement("script");
                    script.src = "../js/index.js";
                    document.body.appendChild(script);

                    // Load projects.js after header is loaded
                });
        </script>

        <div id="project-container" class="project-container">
            <div id="projects-list" class="projects-list"></div>
            <script>
                fetch("components/list.html")
                    .then((res) => res.text())
                    .then((data) => {
                        document.getElementById("projects-list").innerHTML =
                            data;
                    });
            </script>
            <div class="project-container-separator"></div>
            <div class="projects-content"></div>
        </div>
    </body>
</html>
